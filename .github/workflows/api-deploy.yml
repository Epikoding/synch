name: Deploy API

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -C apps/api typecheck

      - run: pnpm -C apps/api test:unit

      - run: pnpm -C apps/api test:integration
        env:
          BETTER_AUTH_URL: http://127.0.0.1:8787
          BETTER_AUTH_SECRET: ci-better-auth-secret-that-is-long-enough
          SYNC_TOKEN_SECRET: ci-sync-token-secret-that-is-long-enough

      - name: Validate deployment configuration
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || {
            echo "Set CLOUDFLARE_API_TOKEN before deploying."
            exit 1
          }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || {
            echo "Set CLOUDFLARE_ACCOUNT_ID before deploying."
            exit 1
          }
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy API
        run: pnpm -C apps/api deploy:managed
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
