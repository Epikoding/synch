name: Obsidian Plugin CI

on:
  pull_request:
    paths:
      - "apps/obsidian-plugin/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/obsidian-plugin-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/obsidian-plugin/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/obsidian-plugin-ci.yml"

jobs:
  obsidian-plugin:
    runs-on: ubuntu-latest

    env:
      API_BASE_URL: https://synch-api.example.com

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -C apps/obsidian-plugin typecheck

      - run: pnpm -C apps/obsidian-plugin test -- --run

      - run: pnpm -C apps/obsidian-plugin build
