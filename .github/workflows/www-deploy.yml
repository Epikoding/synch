name: Deploy WWW

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-www
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate deployment configuration
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || {
            echo "Set CLOUDFLARE_API_TOKEN before deploying."
            exit 1
          }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || {
            echo "Set CLOUDFLARE_ACCOUNT_ID before deploying."
            exit 1
          }
          test -n "$PUBLIC_API_URL" || {
            echo "Set the PUBLIC_API_URL GitHub Actions variable before deploying."
            exit 1
          }
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}

      - name: Build WWW
        run: pnpm -C apps/www build
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}

      - name: Deploy WWW
        run: pnpm -C apps/www deploy:built
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
